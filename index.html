<script>

// BASEMAP

var osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
var dark=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
var googleHybrid=L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}',{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']});
var googleSat=L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:20,subdomains:['mt0','mt1','mt2','mt3']});

var esriGray=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}',
{maxZoom:16}
);

var esriGrayLabel=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Reference/MapServer/tile/{z}/{y}/{x}',
{maxZoom:16}
);

// MAP

var map=L.map('map',{
zoomControl:true,
layers:[osm],
zoomSnap:0.25,
zoomDelta:0.25,
wheelPxPerZoomLevel:120
});

map.attributionControl.addAttribution("© DKKN-BAPETEN 2026");

var indonesiaBounds=[[-11,94],[6,141]];
map.fitBounds(indonesiaBounds);

// LAYERS

var polygonLayer=L.layerGroup().addTo(map);
var labelLayer=L.layerGroup().addTo(map);

// LAYER CONTROL

L.control.layers(
{
"OpenStreetMap":osm,
"Dark":dark,
"Google Hybrid":googleHybrid,
"Google Satellite":googleSat,
"ESRI Light Gray":esriGray
},
{
"ESRI Labels":esriGrayLabel,
"Station Polygons":polygonLayer,
"Station Labels":labelLayer
}
).addTo(map);


// RADIUS

function getRadius(){

var zoom=map.getZoom();
var base=40000;

return Math.max(base/Math.pow(2,zoom-5),80);

}


// HEXAGON

function createHex(lat,lon,radius,color,options={}){

var coords=[];

for(var i=0;i<6;i++){

var angle=(Math.PI/180)*(60*i);

var dx=radius*Math.cos(angle);
var dy=radius*Math.sin(angle);

coords.push([
lat+(dy/111111),
lon+(dx/(111111*Math.cos(lat*Math.PI/180)))
]);

}

return L.polygon(coords,{
color:options.stroke || "#222",
weight:options.weight || 1,
fillColor:color,
fillOpacity:options.opacity || 0.85
});

}


// COLOR

function getColor(d){

if(!d || d==="Out of service") return "#2b83ba";

d=parseFloat(d);

if(isNaN(d)) return "#2b83ba";

if(d<1000) return "#2b83ba";
if(d<100000) return "#ffe600";
if(d<1000000) return "#ff9b00";

return "#ff2b2b";

}


// CLUSTER FUNCTION

function clusterStations(data,radius){

var clusters=[];

data.forEach(row=>{

if(!row["LATITUDE"]) return;

var lat=parseFloat(row["LATITUDE"]);
var lon=parseFloat(row["LONGITUDE"]);
var dose=row["Gamma Dose Rate (nSv/h)"];

var placed=false;

clusters.forEach(c=>{

var dLat=Math.abs(c.lat-lat);
var dLon=Math.abs(c.lon-lon);

if(dLat<radius/111111 && dLon<radius/111111){

c.points.push({lat:lat,lon:lon,dose:dose});

var v=parseFloat(dose);
if(!isNaN(v) && v>c.maxDose) c.maxDose=v;

placed=true;

}

});

if(!placed){

var v=parseFloat(dose);

clusters.push({
lat:lat,
lon:lon,
points:[{lat:lat,lon:lon,dose:dose}],
maxDose:isNaN(v)?0:v
});

}

});

return clusters;

}


// LOAD CSV

function loadCSV(){

fetch("output.csv?nocache="+Date.now())
.then(r=>r.text())
.then(text=>{

polygonLayer.clearLayers();
labelLayer.clearLayers();

var radius=getRadius();

var data=Papa.parse(text,{header:true}).data;

var zoom=map.getZoom();


// =======================
// ZOOM JAUH → CLUSTER
// =======================

if(zoom<7){

var clusters=clusterStations(data,radius);

clusters.forEach(c=>{

var color=getColor(c.maxDose);

var hex=createHex(c.lat,c.lon,radius*1.4,color,{opacity:0.85});

hex.addTo(polygonLayer);

});

}


// =======================
// ZOOM DEKAT → STATION
// =======================

else{

data.forEach(row=>{

if(!row["LATITUDE"]) return;

var lat=parseFloat(row["LATITUDE"]);
var lon=parseFloat(row["LONGITUDE"]);

var dose=row["Gamma Dose Rate (nSv/h)"];

var color=getColor(dose);

var hex;

if(dose==="Out of service"){

hex=createHex(lat,lon,radius,color,{opacity:0.35,stroke:"#004a8f",weight:2});

}else{

hex=createHex(lat,lon,radius,color,{opacity:0.85});

}

var displayDose=row["Gamma Dose Rate (nSv/h)"];

var doseText="";

if(displayDose==="Out of service"){

doseText="Dose Rate: Out of service";

}else if(displayDose!==""){

doseText="Dose Rate: "+parseFloat(displayDose).toFixed(2)+" nSv/h";

}

var popupContent=
"<b>"+row["NAMA UNIT"]+"</b><br>"+
doseText+"<br>"+
"Last Update: "+row["LAST UPDATE (WIB)"]+"<br><br>"+
"<a href='#' onclick=\"openTS('"+row["NAMA UNIT"]+"')\">View Time Series</a>";

hex.bindPopup(popupContent,{maxWidth:280,minWidth:180});

hex.addTo(polygonLayer);


// LABEL

var labelOffsetLat = lat + (radius/111111)*0.9;
var labelOffsetLon = lon + (radius/(111111*Math.cos(lat*Math.PI/180)))*0.9;

var label=L.marker([labelOffsetLat,labelOffsetLon],{
icon:L.divIcon({
className:'',
html:'<div class="unit-label">'+row["NAMA UNIT"]+'</div>',
iconSize:null
})
});

label.addTo(labelLayer);

});

}

});

}


loadCSV();
setInterval(loadCSV,30000);
map.on("zoomend",loadCSV);

</script>
