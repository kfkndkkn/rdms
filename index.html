<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Indonesia Radiation Data Monitoring System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html,body{margin:0;padding:0;font-family:Arial;}

#header{
position:absolute;top:0;left:0;width:100%;height:70px;
background:#0b1e3f;color:white;display:flex;align-items:center;padding:0 20px;z-index:9999;
}

#map{position:absolute;top:70px;bottom:0;width:100%;}

.unit-label{
background:white;padding:3px 6px;border-radius:5px;font-size:11px;
}

.legend{
background:white;padding:10px;font-size:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<div id="header">
<h2>Indonesia Radiation Data Monitoring System</h2>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ================= PROFILE =================
var stationProfile={};

function loadProfile(){
fetch("https://raw.githubusercontent.com/kfkndkkn/rdms/main/profile.csv")
.then(r=>r.text())
.then(text=>{
var data=Papa.parse(text,{header:true}).data;

data.forEach(row=>{
if(row.station_name){
stationProfile[row.station_name.trim().toLowerCase()] = row;
}
});

console.log("PROFILE READY");
loadCSV();
setInterval(loadCSV,30000);

});
}

// ================= MAP =================
var map=L.map('map').setView([-2,118],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var polygonLayer=L.layerGroup().addTo(map);

// ================= HEXAGON =================
function createHex(lat,lon,r,color){

var coords=[];

for(var i=0;i<6;i++){
var angle=(Math.PI/180)*(60*i);
coords.push([
lat+(r*Math.sin(angle)/111111),
lon+(r*Math.cos(angle)/(111111*Math.cos(lat*Math.PI/180)))
]);
}

return L.polygon(coords,{
color:"#222",
weight:1,
fillColor:color,
fillOpacity:0.85
});
}

// ================= COLOR =================
function getColor(d){
d=parseFloat(d);
if(isNaN(d)) return "#2b83ba";
if(d<1000) return "#2b83ba";
if(d<100000) return "#ffe600";
if(d<1000000) return "#ff9b00";
return "#ff2b2b";
}

// ================= AGGREGATE =================
function aggregate(data){

var grid={};

data.forEach(r=>{
var lat=parseFloat(r["LATITUDE"]);
var lon=parseFloat(r["LONGITUDE"]);
var dose=parseFloat(r["Gamma Dose Rate (nSv/h)"]);

if(isNaN(lat)||isNaN(lon)) return;

var key=Math.floor(lat)+"_"+Math.floor(lon);

if(!grid[key]){
grid[key]={lat:0,lon:0,sum:0,count:0,rows:[]};
}

grid[key].lat+=lat;
grid[key].lon+=lon;
grid[key].sum+=dose||0;
grid[key].count++;
grid[key].rows.push(r);
});

return Object.values(grid).map(g=>({
lat:g.lat/g.count,
lon:g.lon/g.count,
dose:g.sum/g.count,
rows:g.rows
}));

}

// ================= LOAD CSV =================
function loadCSV(){

fetch("output.csv?nocache="+Date.now())
.then(r=>r.text())
.then(text=>{

polygonLayer.clearLayers();

var raw=Papa.parse(text,{header:true}).data;

var data = map.getZoom()<6 ? aggregate(raw) : raw;

data.forEach(row=>{

var lat=row.lat || parseFloat(row["LATITUDE"]);
var lon=row.lon || parseFloat(row["LONGITUDE"]);
var dose=row.dose || row["Gamma Dose Rate (nSv/h)"];

if(isNaN(lat)||isNaN(lon)) return;

var color=getColor(dose);

var hex=createHex(lat,lon,40000,color);

// ===== PROFILE =====
var key = row["NAMA UNIT"] ? row["NAMA UNIT"].trim().toLowerCase() : "";
var p = stationProfile[key];

var extra="";

if(p){

var img="";
if(p.image_url && p.image_url.startsWith("http")){
img=`<img src="${p.image_url}" style="width:100%;height:120px;object-fit:cover" onerror="this.style.display='none'">`;
}

extra=`
${img}
${p.address||""}<br>
${p.province||""}<br>
Status: ${p.status||""}<br><br>
`;
}

// ===== POPUP =====
var popup="<b>"+(row["NAMA UNIT"]||"Cluster")+"</b><br><br>"+
extra+
"Dose: "+dose+" nSv/h";

hex.bindPopup(popup).addTo(polygonLayer);

});

});
}

// ================= LEGEND =================
var legend=L.control({position:"bottomleft"});

legend.onAdd=function(){

var div=L.DomUtil.create("div","legend");

div.innerHTML=`
<b>Dose Level</b><br>
<div style="background:#2b83ba;width:20px;height:10px;display:inline-block"></div> Low<br>
<div style="background:#ffe600;width:20px;height:10px;display:inline-block"></div> Medium<br>
<div style="background:#ff9b00;width:20px;height:10px;display:inline-block"></div> High<br>
<div style="background:#ff2b2b;width:20px;height:10px;display:inline-block"></div> Extreme
`;

return div;
};

legend.addTo(map);

// ================= START =================
window.onload=function(){
loadProfile();
};

</script>

</body>
</html>
